name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "43 9 * * 1"

permissions:
  contents: read

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests
      - run: bash scripts/security-check.sh
      - uses: gitleaks/gitleaks-action@v3
